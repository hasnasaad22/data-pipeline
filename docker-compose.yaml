services:
  db:
    container_name: postgres_container
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: airflow_db
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - my-network

  airflow-init:
    build: .
    container_name: airflow_init
    depends_on:
      - db
    restart: "no"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@db:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: mysecretkey
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@mail.com
      "
    networks:
      - my-network

  airflow-webserver:
    build: .
    container_name: airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8000:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@db:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: mysecretkey
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./weather_dbt:/opt/airflow/weather_dbt
      - ./profiles.yml:/home/airflow/.dbt/profiles.yml
      - ./weather_dbt_dag.py:/opt/airflow/dags/weather_dbt_dag.py
    command: airflow webserver
    networks:
      - my-network

  airflow-scheduler:
    build: .
    container_name: airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@db:5432/airflow_db
      AIRFLOW__WEBSERVER__SECRET_KEY: mysecretkey
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./weather_dbt:/opt/airflow/weather_dbt
      - ./profiles.yml:/home/airflow/.dbt/profiles.yml
      - ./weather_dbt_dag.py:/opt/airflow/dags/weather_dbt_dag.py
    command: airflow scheduler
    networks:
      - my-network

networks:
  my-network:
    driver: bridge

volumes:
  pg_data:
